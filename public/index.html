<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispatch ACARS Summary</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h2>Dispatch ACARS Summary</h2>
    
    <!-- SimBrief Section -->
    <div class="form-group">
      <input id="username" placeholder="Enter SimBrief Username" />
      <button id="fetchBtn" class="btn-primary">Fetch Summary</button>
    </div>
    <div class="form-group">
      <button id="takeoffBtn" class="btn-action">Takeoff Data</button>
      <button id="landingBtn" class="btn-action">Landing Data</button>
    </div>
    <div class="form-group">
      <button id="departureAtisBtn" class="btn-action">Departure ATIS</button>
      <button id="arrivalAtisBtn" class="btn-action">Arrival ATIS</button>
    </div>
    <div id="status"></div>

    <!-- HOPPIE ACARS Section -->
    <div class="acars-section">
      <h3>HOPPIE ACARS Communication</h3>
      <div class="form-group">
        <input id="hoppie-logon" placeholder="HOPPIE Logon Code" />
      </div>
      <div class="form-group">
        <input id="from-callsign" placeholder="From Callsign (e.g., OPS)" />
        <input id="to-callsign" placeholder="To Callsign (e.g., AAL123)" />
      </div>
      <div class="form-group">
        <select id="message-type">
          <option value="telex">Telex</option>
          <option value="ocl">OCL (Operational Control)</option>
          <option value="cpdlc">CPDLC</option>
        </select>
        <textarea id="acars-message" rows="3" placeholder="Enter ACARS message..."></textarea>
      </div>
      <div class="form-group">
        <button id="sendBtn" class="btn-primary">Send Message</button>
        <button id="pollBtn" class="btn-secondary">Poll Messages</button>
      </div>
      <div id="hoppie-status"></div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
